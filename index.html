    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #1a1a1e;
            --text-color: #ffffff;
            --accent-p1: #3b82f6; 
            --accent-p2: #ef4444; 
            --board-green: #0b6623;
            --board-red: #b22222;
            --board-black: #141414;
            --board-beige: #e4d5b7;
            --hud-top-height: 105px;
            --hud-bottom-height: 135px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden; 
            position: fixed; 
        }

        /* SEQUENTIAL SETUP WIZARD OVERLAY */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 12, 0.92);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .setup-step {
            display: none;
            text-align: center;
            flex-direction: column;
            height: 100%;
        }
        .setup-step.active {
            display: flex;
        }

        .modal-card h2 { margin: 0 0 6px 0; font-size: 1.4rem; font-weight: 800; }
        .modal-card p { color: #71717a; margin: 0 0 20px 0; font-size: 0.9rem; }
        .mode-options { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }

        #voice-options {
            max-height: 320px;
            overflow-y: auto;
            padding-right: 8px;
            margin-bottom: 10px;
        }

        /* Custom scrollbar for voice list */
        #voice-options::-webkit-scrollbar { width: 6px; }
        #voice-options::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        #voice-options::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        .mode-btn {
            background: #27272a;
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .mode-btn:active { background: var(--accent-p1); transform: scale(0.98); }

        /* FIXED TOP HUD WITH STABLE HEIGHT BUFFERING */
        .hud-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--hud-top-height);
            background: var(--card-bg);
            z-index: 10;
            display: flex;
            padding: 8px;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-bottom: 1px solid #27272a;
        }

        .player-box {
            flex: 1;
            padding: 6px;
            border-radius: 10px;
            background: rgba(255,255,255,0.02);
            text-align: center;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            overflow: hidden;
        }
        .player-box.active.p1 { border-color: var(--accent-p1); background: rgba(59, 130, 246, 0.08); }
        .player-box.active.p2 { border-color: var(--accent-p2); background: rgba(239, 68, 68, 0.08); }
        
        .name { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; color: #71717a; line-height: 1; }
        .player-box.active .name { color: #fff; }
        
        .score { font-size: 1.6rem; font-weight: 800; line-height: 1; margin: 2px 0; transition: font-size 0.2s; }
        .player-box.has-checkout .score { font-size: 1.35rem; }

        .status-badge { font-size: 0.6rem; font-weight: 700; color: #a1a1aa; text-transform: uppercase; line-height: 1; }
        
        .checkout-suggestion {
            font-size: 0.65rem;
            font-weight: 800;
            color: #facc15;
            background: rgba(250, 204, 21, 0.12);
            padding: 3px 4px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1;
            margin-top: 2px;
        }

        /* ISOLATED MIDDLE VIEWPORT */
        .board-viewport {
            position: absolute;
            top: var(--hud-top-height);
            bottom: var(--hud-bottom-height);
            left: 0;
            width: 100%;
            background: #050507;
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none; 
        }

        .board-container {
            width: 90vw;
            max-width: 420px;
            padding: 0;
            flex-shrink: 0;
            transform-origin: center center;
            cursor: grab;
            will-change: transform; 
        }
        .board-container:active { cursor: grabbing; }

        svg { width: 100%; height: auto; filter: drop-shadow(0 8px 24px rgba(0,0,0,0.7)); }

        /* FIXED BOTTOM HUD */
        .hud-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--hud-bottom-height);
            background: var(--card-bg);
            z-index: 10;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
            border-top: 1px solid #27272a;
        }

        .turn-status { display: flex; justify-content: space-between; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; }
        .rule-indicator { font-size: 0.75rem; color: #71717a; font-weight: 600; }
        .dart-slots { display: flex; gap: 8px; }
        
        .dart-slot {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 8px;
            text-align: center;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1rem;
        }

        .button-grid { display: flex; gap: 8px; }

        button.action-btn {
            flex: 1;
            background: #27272a;
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
        }
        button.action-btn:active { background: #3f3f46; }
        button.miss { background: #a16207; flex: 1.4; }
        button.miss:active { background: #ca8a04; }
        button.reset { background: #7f1d1d; max-width: 65px; font-size: 0.8rem; }
        button.voice-rec { background: #1e1b4b; max-width: 65px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        button.voice-rec.active { background: #4338ca; animation: pulse-blue 1.5s infinite; }

        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(67, 56, 202, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(67, 56, 202, 0); }
            100% { box-shadow: 0 0 0 0 rgba(67, 56, 202, 0); }
        }

        .voice-status {
            position: fixed;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 0.9rem;
            font-weight: 700;
            z-index: 1000;
            display: none;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
        }

        /* Board Elements */
        .segment { cursor: pointer; }
        .segment:active { fill: #facc15 !important; }
        .wire { stroke: #ffffff; stroke-width: 1.2; fill: none; pointer-events: none; }
        .board-text { fill: #ffffff; font-size: 24px; font-weight: 800; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }

        /* TARGET CHECKOUT HIGHLIGHTER EFFECT */
        @keyframes target-pulse {
            0% { stroke: #facc15; stroke-width: 2px; filter: drop-shadow(0 0 2px #facc15); }
            50% { stroke: #ffffff; stroke-width: 5px; filter: drop-shadow(0 0 10px #facc15); }
            100% { stroke: #facc15; stroke-width: 2px; filter: drop-shadow(0 0 2px #facc15); }
        }

        .target-highlight {
            animation: target-pulse 0.8s infinite ease-in-out;
            stroke-alignment: inner;
            z-index: 5;
        }
    </style>
</head>
<body>

    <script>
       // --- STATE MANAGEMENT ---
const boardNumbers = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];

let currentModeValue = 501;
let selectedRuleSet = 'do'; 
let scores = { p1: 501, p2: 501 };
let turnStartScore = 501; // Fix: Tracks score baseline prior to current 3-dart turn
let activePlayer = 'p1';
let currentTurnDarts = [];
let currentTurnValues = []; 
let matchHistory = [];
let playerActiveInMatch = { p1: false, p2: false };
let selectedVoiceIndex = 0; 
let isListening = false;
let recognition;

// --- SPEECH RECOGNITION SETUP ---
if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript.toLowerCase().trim();
        showVoiceStatus(`Heard: "${transcript}"`);
        parseAndRegisterVoiceDart(transcript);
    };

    recognition.onend = () => {
        if (isListening) {
            // Restart if we are still in listening mode and turn is not over
            if (currentTurnDarts.length < 3) {
                recognition.start();
            } else {
                stopListening();
            }
        }
    };

    recognition.onerror = (event) => {
        console.error("Speech Recognition Error:", event.error);
        if (event.error === 'not-allowed') {
            alert("Microphone access denied. Please enable it in your browser settings.");
            stopListening();
        }
    };
}

function toggleVoiceRecognition() {
    if (!recognition) {
        alert("Speech Recognition is not supported in this browser.");
        return;
    }

    if (isListening) {
        stopListening();
    } else {
        startListening();
    }
}

function startListening() {
    isListening = true;
    document.getElementById('mic-btn').classList.add('active');
    showVoiceStatus("Listening...");
    try {
        recognition.start();
    } catch(e) {
        console.warn("Recognition already started");
    }
}

function stopListening() {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('active');
    hideVoiceStatus();
    try {
        recognition.stop();
    } catch(e) {}
}

function showVoiceStatus(text) {
    const status = document.getElementById('v-status');
    status.innerText = text;
    status.style.display = "block";
}

function hideVoiceStatus() {
    document.getElementById('v-status').style.display = "none";
}

function updateRecognitionLanguage() {
    if (recognition) {
        const lang = document.getElementById('lang-select').value;
        recognition.lang = lang;
        console.log("Recognition language set to:", lang);
    }
}

function parseAndRegisterVoiceDart(text) {
    let multiplier = 1;
    let score = 0;
    let label = "";

    // Multilingual support for multipliers
    const triples = ["triple", "treble", "trippel", "dreifach"];
    const doubles = ["double", "dubbel", "doppel"];
    
    if (triples.some(t => text.includes(t))) {
        multiplier = 3;
    } else if (doubles.some(d => text.includes(d))) {
        multiplier = 2;
    }

    // Normalize common phonetic misinterpretations and number words
    text = text.replace(/tree/g, "3").replace(/too|to/g, "2").replace(/won|one/g, "1");
    text = text.replace(/één|eins/g, "1").replace(/twee|zwei/g, "2").replace(/drie|drei/g, "3");
    
    // Extraction for Bulls
    if (text.includes("bullseye") || text.includes("inner bull") || text.includes("double bull") || text.includes("roos")) {
        score = 25; multiplier = 2; label = "D50";
    } else if (text.includes("outer bull") || text.includes("bull") || text.includes("buitenste roos")) {
        score = 25; multiplier = 1; label = "B25";
    } else if (text.includes("miss") || text.includes("out") || text.includes("mis")) {
        handleMiss(); return;
    } else {
        const numMatch = text.match(/\d+/);
        if (numMatch) {
            score = parseInt(numMatch[0]);
            if (score > 20 && score !== 25) {
                showVoiceStatus("Invalid number (1-20 or Bull)");
                return;
            }
            label = (multiplier === 3 ? "T" : multiplier === 2 ? "D" : "") + score;
        } else {
            showVoiceStatus("Could not understand score.");
            return;
        }
    }

    registerDart(score, multiplier, label);
}

const professionalCheckoutMap = {

// --- AUDIO & EXPRESSIVE INTONATION ENGINE ---
function speak(text, isScoreCall = false, scoreValue = 0) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); // Abort previously active voices immediately
        
        let processedText = text;
        let pitch = 0.95; 
        let rate = 1.05;

        // Custom string formatting patterns simulating referee audio styles
        if (isScoreCall) {
            if (scoreValue === 180) {
                pitch = 0.85; 
                rate = 0.90;  
            } else if (scoreValue >= 100) {
                let remainder = scoreValue - 100;
                pitch = 0.90;
                rate = 0.95;
            } else if (scoreValue >= 60) {
                processedText = `${scoreValue}!`;
                pitch = 1.0;
                rate = 1.1; 
            } else if (scoreValue === 0) {
                processedText = "No score.";
                pitch = 0.80; 
                rate = 1.0;
            }
        }

        const utterance = new SpeechSynthesisUtterance(processedText);
        utterance.pitch = pitch;
        utterance.rate = rate;

        const voices = window.speechSynthesis.getVoices();
        if (voices.length > 0 && voices[selectedVoiceIndex]) {
            utterance.voice = voices[selectedVoiceIndex];
        }

        window.speechSynthesis.speak(utterance);
    }
}

// Opens the voice selection menu

    const voices = window.speechSynthesis.getVoices();
    const container = document.getElementById('voice-options');
    container.innerHTML = "";

    voices.forEach((voice, index) => {
        const btn = document.createElement('button');
        btn.className = "mode-btn";
        if (index === selectedVoiceIndex) {
            btn.style.background = "var(--accent-p1)";
        }
        btn.innerText = `${voice.name} (${voice.lang})`;
        btn.onclick = () => selectVoice(index);
        container.appendChild(btn);
    });

    document.querySelectorAll('.setup-step').forEach(s => s.classList.remove('active'));
    document.getElementById('step-voice').classList.add('active');
    document.getElementById('game-modal').classList.add('open');
}

    speak(`Voice profile ${voices[index].name} selected.`);

}

// --- BOARD BUILDER ---
function buildBoard() {
    const container = document.getElementById('board-segments');
    let htmlString = "";
    const cx = 300, cy = 300;
    const rDoubleOut = 230, rDoubleIn = 214, rTripleOut = 148, rTripleIn = 132;
    const anglePerSlice = 360 / 20;

    boardNumbers.forEach((num, index) => {
        const startAngle = (index * anglePerSlice) - 90 - (anglePerSlice / 2);
        const endAngle = startAngle + anglePerSlice;
        const isEven = index % 2 === 0;
        const mainColor = isEven ? "var(--board-black)" : "var(--board-beige)";
        const ringColor = isEven ? "var(--board-red)" : "var(--board-green)";

        const polarToCartesian = (r, angle) => {
            const rad = (angle * Math.PI) / 180.0;
            return { x: cx + (r * Math.cos(rad)), y: cy + (r * Math.sin(rad)) };
        };

        const dPath = (rIn, rOut) => {
            const p1 = polarToCartesian(rOut, startAngle);
            const p2 = polarToCartesian(rOut, endAngle);
            const p3 = polarToCartesian(rIn, endAngle);
            const p4 = polarToCartesian(rIn, startAngle);
            return `M ${p1.x} ${p1.y} A ${rOut} ${rOut} 0 0 1 ${p2.x} ${p2.y} L ${p3.x} ${p3.y} A ${rIn} ${rIn} 0 0 0 ${p4.x} ${p4.y} Z`;
        };

        htmlString += `<path class="segment" data-score="${num}" data-mult="2" data-id="D${num}" data-label="D${num}" d="${dPath(rDoubleIn, rDoubleOut)}" fill="${ringColor}"/>`;
        htmlString += `<path class="segment" data-score="${num}" data-mult="1" data-id="${num}" data-label="${num}" d="${dPath(rTripleOut, rDoubleIn)}" fill="${mainColor}"/>`;
        htmlString += `<path class="segment" data-score="${num}" data-mult="3" data-id="T${num}" data-label="T${num}" d="${dPath(rTripleIn, rTripleOut)}" fill="${ringColor}"/>`;
        htmlString += `<path class="segment" data-score="${num}" data-mult="1" data-id="${num}-inner" data-label="${num}" d="${dPath(24, rTripleIn)}" fill="${mainColor}"/>`;

        const textPos = polarToCartesian(258, startAngle + (anglePerSlice / 2));
        htmlString += `<text x="${textPos.x}" y="${textPos.y}" class="board-text">${num}</text>`;
    });
    container.innerHTML = htmlString;
}

// --- CHECKOUT LOGIC ---
function getCheckoutRoute(score) {
    const isDoubleOut = (selectedRuleSet === 'dido' || selectedRuleSet === 'do');
    if (isDoubleOut) {
        return professionalCheckoutMap[score] || "";
    } else {
        if (score <= 0 || score > 180) return "";
        let remaining = score;
        let path = [];
        for (let i = 0; i < 3; i++) {
            if (remaining === 0) break;
            if (remaining > 60) {
                path.push("T20"); remaining -= 60;
            } else if (remaining === 50) {
                path.push("D50"); remaining -= 50;
            } else if (remaining > 20 && remaining % 3 === 0) {
                path.push(`T${remaining / 3}`); remaining = 0;
            } else if (remaining > 20 && remaining % 2 === 0 && (remaining / 2) <= 20) {
                path.push(`D${remaining / 2}`); remaining = 0;
            } else if (remaining <= 20) {
                path.push(`${remaining}`); remaining = 0;
            } else {
                path.push("20"); remaining -= 20;
            }
        }
        return path.join(", ");
    }
}

function highlightNextTarget() {
    document.querySelectorAll('.target-highlight').forEach(el => el.classList.remove('target-highlight'));

    if (!playerActiveInMatch[activePlayer]) return; 

    const currentScore = scores[activePlayer];
    const routeString = getCheckoutRoute(currentScore);
    if (!routeString) return;

    const targets = routeString.split(',').map(s => s.trim());
    if (currentTurnDarts.length >= 3) return;

    let nextTargetId = targets[0];
    if (!nextTargetId) return;

    if (nextTargetId === "Bull") nextTargetId = "D50"; 
    if (nextTargetId === "D25") nextTargetId = "B25";

    let targetSegment = document.querySelector(`[data-id="${nextTargetId}"]`);
    if (!targetSegment && !isNaN(nextTargetId)) {
        targetSegment = document.querySelector(`[data-id="${nextTargetId}-inner"]`);
    }

    if (targetSegment) {
        targetSegment.classList.add('target-highlight');
    }
}

function finalizeGameSetup(ruleSelection) {
    selectedRuleSet = ruleSelection;
    scores = { p1: currentModeValue, p2: currentModeValue };
    turnStartScore = currentModeValue; // Baseline setup tracking
    activePlayer = 'p1';
    currentTurnDarts = [];
    currentTurnValues = [];
    matchHistory = [];
    
    if (selectedRuleSet === 'dido') {
        playerActiveInMatch = { p1: false, p2: false };
    } else {
        playerActiveInMatch = { p1: true, p2: true };
    }

    scale = 1; posX = 0; posY = 0;
    applyTransform();
    updateUI();
    
    document.getElementById('game-modal').classList.remove('open');
    speak("Game on.");
}

function triggerReset() {
    document.getElementById('step-2').classList.remove('active');
    document.getElementById('step-1').classList.add('active');
    document.getElementById('game-modal').classList.add('open');
}

// --- VIEWPORT INTERACTION (PAN / ZOOM) ---
const viewport = document.getElementById('viewport');
const board = document.getElementById('board');
let scale = 1, lastScale = 1;
let posX = 0, posY = 0;
let lastPosX = 0, lastPosY = 0;
let isDragging = false;
let startTouchDistance = 0;
let hasDraggedSignificantly = false;

viewport.addEventListener('touchstart', (e) => {
    hasDraggedSignificantly = false;
    if (e.touches.length === 1) {
        isDragging = true;
        lastPosX = e.touches[0].clientX - posX;
        lastPosY = e.touches[0].clientY - posY;
    } else if (e.touches.length === 2) {
        isDragging = false;
        startTouchDistance = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        lastScale = scale;
    }
}, { passive: true });

viewport.addEventListener('touchmove', (e) => {
    if (isDragging && e.touches.length === 1) {
        hasDraggedSignificantly = true;
        posX = e.touches[0].clientX - lastPosX;
        posY = e.touches[0].clientY - lastPosY;
        applyTransform();
    } else if (e.touches.length === 2) {
        hasDraggedSignificantly = true;
        const currentDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        scale = lastScale * (currentDist / startTouchDistance);
        if (scale < 1) scale = 1;
        if (scale > 3) scale = 3;
        applyTransform();
    }
}, { passive: true });

viewport.addEventListener('touchend', () => { isDragging = false; });

function applyTransform() {
    board.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

// --- CORE SCORING & GAME ENGINE ---
function registerDart(score, multiplier, label) {
    const hitValue = score * multiplier;
    
    // Push precise parameters to undo stack
    matchHistory.push({
        scores: { ...scores },
        activePlayer,
        currentTurnDarts: [...currentTurnDarts],
        currentTurnValues: [...currentTurnValues],
        playerActiveInMatch: { ...playerActiveInMatch },
        turnStartScore: turnStartScore
    });

    const currentScore = scores[activePlayer];
    
    // Handle Misses
    if (hitValue === 0) {
        currentTurnDarts.push(label);
        currentTurnValues.push(0);
        speak("Miss!");
        updateUI();
        checkTurnLifecycle();
        return;
    }
    
    // Double In Check Validation
    if (!playerActiveInMatch[activePlayer]) {
        if (multiplier === 2) {
            playerActiveInMatch[activePlayer] = true;
            scores[activePlayer] = currentScore - hitValue;
            currentTurnDarts.push(label);
            currentTurnValues.push(hitValue);
        } else {
            currentTurnDarts.push("0 (No DI)");
            currentTurnValues.push(0);
            speak("Double in required.");
        }
        updateUI();
        checkTurnLifecycle();
        return;
    }

    const prospectiveScore = currentScore - hitValue;
    const isDoubleOut = (selectedRuleSet === 'dido' || selectedRuleSet === 'do');

    // CONDITIONAL VALIDATION LOOKUPS (BUST STRATEGIES)
    if (prospectiveScore < 0 || (prospectiveScore === 1 && isDoubleOut) || (prospectiveScore === 0 && isDoubleOut && multiplier !== 2)) {
        speak("Bust!");
        
        // BUG FIX: Immediately restore score to its clean turn state setting
        scores[activePlayer] = turnStartScore;
        
        currentTurnDarts.push("Bust");
        currentTurnValues.push(0); // Zero out points credited for entire leg sequence turn
        
        // Populate missing arrays to close out throwing turn cycles
        while(currentTurnDarts.length < 3) {
            currentTurnDarts.push("-");
            currentTurnValues.push(0);
        }
    } else if (prospectiveScore === 0) {
        // Leg Check-out Completion
        scores[activePlayer] = 0;
        currentTurnDarts.push(label);
        currentTurnValues.push(hitValue);
        updateUI();
        
        const winnerName = activePlayer === 'p1' ? "Player 1" : "Player 2";
        speak(`Game over! ${winnerName} wins the leg!`);
        
        setTimeout(() => {
            alert(`Game Over! ${winnerName} Wins the Leg!`);
            triggerReset();
        }, 100);
        return;
    } else {
        // Safe standard subtraction credit
        scores[activePlayer] = prospectiveScore;
        currentTurnDarts.push(label);
        currentTurnValues.push(hitValue);
    }

    updateUI();
    checkTurnLifecycle();
}

function checkTurnLifecycle() {
    if (currentTurnDarts.length >= 3) {
        const totalTurnScore = currentTurnValues.reduce((a, b) => a + b, 0);
        
        setTimeout(() => {
            speak(`${totalTurnScore}`, true, totalTurnScore);
        }, 150);

        setTimeout(() => {
            // Player handoff swap
            activePlayer = (activePlayer === 'p1') ? 'p2' : 'p1';
            currentTurnDarts = [];
            currentTurnValues = [];
            
            // Sync stable baseline reference for incoming player's new turn
            turnStartScore = scores[activePlayer]; 
            
            updateUI();
        }, 1200);
    }
}

function handleMiss() { registerDart(0, 1, "Miss"); }

function undoLastDart() {
    if (matchHistory.length === 0) return;
    const prev = matchHistory.pop();
    scores = prev.scores;
    activePlayer = prev.activePlayer;
    currentTurnDarts = prev.currentTurnDarts;
    currentTurnValues = prev.currentTurnValues;
    playerActiveInMatch = prev.playerActiveInMatch;
    turnStartScore = prev.turnStartScore || scores[activePlayer]; 
    updateUI();
}

// --- INTERFACE SYNC RENDERING ---
function updateUI() {
    const cardP1 = document.getElementById('card-p1');
    const cardP2 = document.getElementById('card-p2');

    document.getElementById('score-p1').innerText = scores.p1;
    document.getElementById('score-p2').innerText = scores.p2;
    
    cardP1.classList.toggle('active', activePlayer === 'p1');
    cardP2.classList.toggle('active', activePlayer === 'p2');

    const routeP1 = getCheckoutRoute(scores.p1);
    const chkP1Element = document.getElementById('chk-p1');
    if (routeP1 && playerActiveInMatch.p1) {
        chkP1Element.innerText = routeP1;
        chkP1Element.style.display = "block";
        cardP1.classList.add('has-checkout');
    } else {
        chkP1Element.style.display = "none";
        cardP1.classList.remove('has-checkout');
    }

    const routeP2 = getCheckoutRoute(scores.p2);
    const chkP2Element = document.getElementById('chk-p2');
    if (routeP2 && playerActiveInMatch.p2) {
        chkP2Element.innerText = routeP2;
        chkP2Element.style.display = "block";
        cardP2.classList.add('has-checkout');
    } else {
        chkP2Element.style.display = "none";
        cardP2.classList.remove('has-checkout');
    }

    const ruleLabel = document.getElementById('rule-lbl');
    if (selectedRuleSet === 'dido') ruleLabel.innerText = "RULES: DI / DO";
    else if (selectedRuleSet === 'do') ruleLabel.innerText = "RULES: OPEN / DO";
    else ruleLabel.innerText = "RULES: NO DOUBLES";

    const b1 = document.getElementById('status-p1');
    const b2 = document.getElementById('status-p2');
    if(selectedRuleSet === 'dido') {
        b1.innerText = playerActiveInMatch.p1 ? "Active" : "Need Double In";
        b2.innerText = playerActiveInMatch.p2 ? "Active" : "Need Double In";
    } else {
        b1.innerText = "Open Scoring";
        b2.innerText = "Open Scoring";
    }

    const txt = document.getElementById('turn-txt');
    if(activePlayer === 'p1') {
        txt.innerText = "PLAYER 1 THROWING";
        txt.style.color = "var(--accent-p1)";
    } else {
        txt.innerText = "PLAYER 2 THROWING";
        txt.style.color = "var(--accent-p2)";
    }

    document.getElementById('d1').innerText = currentTurnDarts[0] || "-";
    document.getElementById('d2').innerText = currentTurnDarts[1] || "-";
    document.getElementById('d3').innerText = currentTurnDarts[2] || "-";

    highlightNextTarget();
}
