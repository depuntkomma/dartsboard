<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isolated Touch Dart Board</title>
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #1a1a1e;
            --text-color: #ffffff;
            --accent-p1: #3b82f6; 
            --accent-p2: #ef4444; 
            --board-green: #0b6623;
            --board-red: #b22222;
            --board-black: #141414;
            --board-beige: #e4d5b7;
            --hud-top-height: 85px;
            --hud-bottom-height: 135px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden; 
            position: fixed; 
        }

        /* GAME SETUP OVERLAY / MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 85%;
            max-width: 360px;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-card h2 {
            margin: 0 0 8px 0;
            font-size: 1.4rem;
            font-weight: 800;
        }

        .modal-card p {
            color: #71717a;
            margin: 0 0 20px 0;
            font-size: 0.9rem;
        }

        .mode-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mode-btn {
            background: #27272a;
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .mode-btn:active {
            background: var(--accent-p1);
        }

        /* FIXED TOP HUD */
        .hud-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--hud-top-height);
            background: var(--card-bg);
            z-index: 10;
            display: flex;
            padding: 10px;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-bottom: 1px solid #27272a;
        }

        .player-box {
            flex: 1;
            padding: 6px;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            text-align: center;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .player-box.active.p1 { border-color: var(--accent-p1); background: rgba(59, 130, 246, 0.08); }
        .player-box.active.p2 { border-color: var(--accent-p2); background: rgba(239, 68, 68, 0.08); }
        .name { font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: #71717a; }
        .player-box.active .name { color: #fff; }
        .score { font-size: 1.8rem; font-weight: 800; line-height: 1.1; }

        /* ISOLATED MIDDLE VIEWPORT */
        .board-viewport {
            position: absolute;
            top: var(--hud-top-height);
            bottom: var(--hud-bottom-height);
            left: 0;
            width: 100%;
            background: #050507;
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none; 
        }

        .board-container {
            width: 90vw;
            max-width: 420px;
            padding: 0;
            flex-shrink: 0;
            transform-origin: center center;
            cursor: grab;
            will-change: transform; 
        }
        .board-container:active { cursor: grabbing; }

        svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.7));
        }

        /* FIXED BOTTOM HUD */
        .hud-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--hud-bottom-height);
            background: var(--card-bg);
            z-index: 10;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
            border-top: 1px solid #27272a;
        }

        .turn-status { font-weight: 800; font-size: 0.85rem; text-transform: uppercase; }
        .dart-slots { display: flex; gap: 8px; }
        
        .dart-slot {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 8px;
            text-align: center;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1rem;
        }

        .button-grid { display: flex; gap: 8px; }

        button.action-btn {
            flex: 1;
            background: #27272a;
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
        }
        button.action-btn:active { background: #3f3f46; }
        button.miss { background: #a16207; flex: 1.4; }
        button.miss:active { background: #ca8a04; }
        button.reset { background: #7f1d1d; max-width: 65px; font-size: 0.8rem; }

        /* Board Elements Layout */
        .segment { cursor: pointer; }
        .segment:active { fill: #facc15 !important; }
        .wire { stroke: #ffffff; stroke-width: 1.2; fill: none; pointer-events: none; }
        .board-text { fill: #ffffff; font-size: 24px; font-weight: 800; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
    </style>
</head>
<body>

    <div class="modal-overlay open" id="game-modal">
        <div class="modal-card">
            <h2>Select Game Mode</h2>
            <p>Choose a target legs starting score</p>
            <div class="mode-options">
                <button class="mode-btn" onclick="selectGameMode(101)">101 Countdown</button>
                <button class="mode-btn" onclick="selectGameMode(301)">301 Countdown</button>
                <button class="mode-btn" onclick="selectGameMode(501)">501 Standard</button>
            </div>
        </div>
    </div>

    <div class="hud-top">
        <div class="player-box active p1" id="card-p1">
            <div class="name">Player 1</div>
            <div class="score" id="score-p1">501</div>
        </div>
        <div class="player-box p2" id="card-p2">
            <div class="name">Player 2</div>
            <div class="score" id="score-p2">501</div>
        </div>
    </div>

    <div class="board-viewport" id="viewport">
        <div class="board-container" id="board">
            <svg viewBox="0 0 600 600" id="dartboard-svg">
                <circle cx="300" cy="300" r="285" fill="#000" />
                <g id="board-segments"></g>
                <circle class="segment" data-score="25" data-mult="1" data-label="B25" cx="300" cy="300" r="24" fill="var(--board-green)" />
                <circle class="segment" data-score="50" data-mult="1" data-label="B50" cx="300" cy="300" r="10" fill="var(--board-red)" />
                <circle class="wire" cx="300" cy="300" r="24" />
                <circle class="wire" cx="300" cy="300" r="132" />
                <circle class="wire" cx="300" cy="300" r="148" />
                <circle class="wire" cx="300" cy="300" r="214" />
                <circle class="wire" cx="300" cy="300" r="230" />
            </svg>
        </div>
    </div>

    <div class="hud-bottom">
        <div class="turn-status">
            <span id="turn-txt" style="color: var(--accent-p1);">PLAYER 1 THROWING</span>
        </div>
        
        <div class="dart-slots">
            <div class="dart-slot" id="d1">-</div>
            <div class="dart-slot" id="d2">-</div>
            <div class="dart-slot" id="d3">-</div>
        </div>

        <div class="button-grid">
            <button class="action-btn miss" onclick="handleMiss()">MISS</button>
            <button class="action-btn" onclick="undoLastDart()">UNDO</button>
            <button class="action-btn reset" onclick="triggerReset()">RESET</button>
        </div>
    </div>

    <script>
        const boardNumbers = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
        
        // Game state engine parameters
        let currentModeValue = 501; // Defaults to standard 501
        let scores = { p1: 501, p2: 501 };
        let activePlayer = 'p1';
        let currentTurnDarts = [];
        let matchHistory = [];

        // Dynamic board generation
        function buildBoard() {
            const container = document.getElementById('board-segments');
            let htmlString = "";
            const cx = 300, cy = 300;
            const rDoubleOut = 230, rDoubleIn = 214, rTripleOut = 148, rTripleIn = 132;
            const anglePerSlice = 360 / 20;

            boardNumbers.forEach((num, index) => {
                const startAngle = (index * anglePerSlice) - 90 - (anglePerSlice / 2);
                const endAngle = startAngle + anglePerSlice;
                const isEven = index % 2 === 0;
                const mainColor = isEven ? "var(--board-black)" : "var(--board-beige)";
                const ringColor = isEven ? "var(--board-red)" : "var(--board-green)";

                const polarToCartesian = (r, angle) => {
                    const rad = (angle * Math.PI) / 180.0;
                    return { x: cx + (r * Math.cos(rad)), y: cy + (r * Math.sin(rad)) };
                };

                const dPath = (rIn, rOut) => {
                    const p1 = polarToCartesian(rOut, startAngle);
                    const p2 = polarToCartesian(rOut, endAngle);
                    const p3 = polarToCartesian(rIn, endAngle);
                    const p4 = polarToCartesian(rIn, startAngle);
                    return `M ${p1.x} ${p1.y} A ${rOut} ${rOut} 0 0 1 ${p2.x} ${p2.y} L ${p3.x} ${p3.y} A ${rIn} ${rIn} 0 0 0 ${p4.x} ${p4.y} Z`;
                };

                htmlString += `<path class="segment" data-score="${num}" data-mult="2" data-label="D${num}" d="${dPath(rDoubleIn, rDoubleOut)}" fill="${ringColor}"/>`;
                htmlString += `<path class="segment" data-score="${num}" data-mult="1" data-label="${num}" d="${dPath(rTripleOut, rDoubleIn)}" fill="${mainColor}"/>`;
                htmlString += `<path class="segment" data-score="${num}" data-mult="3" data-label="T${num}" d="${dPath(rTripleIn, rTripleOut)}" fill="${ringColor}"/>`;
                htmlString += `<path class="segment" data-score="${num}" data-mult="1" data-label="${num}" d="${dPath(24, rTripleIn)}" fill="${mainColor}"/>`;

                const textPos = polarToCartesian(258, startAngle + (anglePerSlice / 2));
                htmlString += `<text x="${textPos.x}" y="${textPos.y}" class="board-text">${num}</text>`;
            });
            container.innerHTML = htmlString;
        }

        // --- GAME CONTROL INTERACTION MODAL FUNCTIONS ---
        function selectGameMode(targetScore) {
            currentModeValue = targetScore;
            scores = { p1: targetScore, p2: targetScore };
            activePlayer = 'p1';
            currentTurnDarts = [];
            matchHistory = [];
            
            // Reset position mapping matrices
            scale = 1; posX = 0; posY = 0;
            applyTransform();
            
            updateUI();
            
            // Close the visual overlay smoothly
            document.getElementById('game-modal').classList.remove('open');
        }

        function triggerReset() {
            // Re-open Selection panel overlay to give option configuration flexibility
            document.getElementById('game-modal').classList.add('open');
        }

        // --- ISOLATED DRAG & PINCH-ZOOM ENGINE LOGIC ---
        const viewport = document.getElementById('viewport');
        const board = document.getElementById('board');
        let scale = 1, lastScale = 1;
        let posX = 0, posY = 0;
        let lastPosX = 0, lastPosY = 0;
        let isDragging = false;
        let startTouchDistance = 0;
        let hasDraggedSignificantly = false;

        viewport.addEventListener('touchstart', (e) => {
            hasDraggedSignificantly = false;
            if (e.touches.length === 1) {
                isDragging = true;
                lastPosX = e.touches[0].clientX - posX;
                lastPosY = e.touches[0].clientY - posY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                startTouchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                lastScale = scale;
            }
        }, { passive: true });

        viewport.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                hasDraggedSignificantly = true;
                posX = e.touches[0].clientX - lastPosX;
                posY = e.touches[0].clientY - lastPosY;
                applyTransform();
            } else if (e.touches.length === 2) {
                hasDraggedSignificantly = true;
                const currentDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                scale = lastScale * (currentDist / startTouchDistance);
                if (scale < 1) scale = 1;
                if (scale > 3) scale = 3;
                applyTransform();
            }
        }, { passive: true });

        viewport.addEventListener('touchend', () => { isDragging = false; });

        function applyTransform() {
            board.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        // --- SCORING LAUNCH CONFIGURATION LOGIC ---
        function registerDart(score, multiplier, label) {
            const hitValue = score * multiplier;
            matchHistory.push({ scores: { ...scores }, activePlayer, currentTurnDarts: [...currentTurnDarts] });

            const currentScore = scores[activePlayer];
            const prospectiveScore = currentScore - hitValue;

            if (prospectiveScore < 0 || prospectiveScore === 1) {
                alert(`Bust! Left with ${currentScore}.`);
                currentTurnDarts.push("Bust");
                while(currentTurnDarts.length < 3) currentTurnDarts.push("-");
            } else if (prospectiveScore === 0) {
                // Win checking condition
                scores[activePlayer] = 0;
                currentTurnDarts.push(label);
                updateUI();
                setTimeout(() => {
                    alert(`Game Over! ${activePlayer === 'p1' ? 'Player 1' : 'Player 2'} Wins!`);
                    triggerReset();
                }, 100);
                return;
            } else {
                scores[activePlayer] = prospectiveScore;
                currentTurnDarts.push(label);
            }

            updateUI();

            if (currentTurnDarts.length >= 3) {
                setTimeout(() => {
                    activePlayer = (activePlayer === 'p1') ? 'p2' : 'p1';
                    currentTurnDarts = [];
                    updateUI();
                }, 400);
            }
        }

        function handleMiss() { registerDart(0, 1, "Miss"); }

        function undoLastDart() {
            if (matchHistory.length === 0) return;
            const prev = matchHistory.pop();
            scores = prev.scores;
            activePlayer = prev.activePlayer;
            currentTurnDarts = prev.currentTurnDarts;
            updateUI();
        }

        function updateUI() {
            document.getElementById('score-p1').innerText = scores.p1;
            document.getElementById('score-p2').innerText = scores.p2;
            document.getElementById('card-p1').classList.toggle('active', activePlayer === 'p1');
            document.getElementById('card-p2').classList.toggle('active', activePlayer === 'p2');

            const txt = document.getElementById('turn-txt');
            if(activePlayer === 'p1') {
                txt.innerText = "PLAYER 1 THROWING";
                txt.style.color = "var(--accent-p1)";
            } else {
                txt.innerText = "PLAYER 2 THROWING";
                txt.style.color = "var(--accent-p2)";
            }

            document.getElementById('d1').innerText = currentTurnDarts[0] || "-";
            document.getElementById('d2').innerText = currentTurnDarts[1] || "-";
            document.getElementById('d3').innerText = currentTurnDarts[2] || "-";
        }

        buildBoard();
        // Event capturing listeners for wedges
        document.getElementById('dartboard-svg').addEventListener('click', function(e) {
            if (hasDraggedSignificantly) return; 
            const seg = e.target.closest('.segment');
            if (!seg) return;
            registerDart(parseInt(seg.getAttribute('data-score')), parseInt(seg.getAttribute('data-mult')), seg.getAttribute('data-label'));
        });
    </script>
</body>
</html>
