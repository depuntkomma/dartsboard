<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Dart Tracker</title>
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #1a1a1e;
            --text-color: #ffffff;
            --text-muted: #9a9a1a;
            --accent-p1: #3b82f6; 
            --accent-p2: #ef4444; 
            --board-green: #0b6623;
            --board-red: #b22222;
            --board-black: #141414;
            --board-beige: #e4d5b7;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Removes blue flash on mobile tap */
            touch-action: manipulation; /* Disables double-tap to zoom delay */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* App Wrapper Optimized for Vertical Mobile Screens */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 480px; /* Perfect width for modern smartphones */
            gap: 12px;
        }

        /* 1. TOP SECTION: THE DARTBOARD */
        .board-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }

        svg {
            width: 100%;
            height: auto;
            max-height: 42vh; /* Prevents board from pushing scoreboard offscreen */
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6));
        }

        /* 2. MIDDLE SECTION: SCORE DISPLAY */
        .scoreboard {
            display: flex;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .player-box {
            flex: 1;
            padding: 12px 8px;
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            text-align: center;
            border: 3px solid transparent;
            transition: all 0.15s ease;
        }

        .player-box.active.p1 {
            border-color: var(--accent-p1);
            background: rgba(59, 130, 246, 0.08);
        }

        .player-box.active.p2 {
            border-color: var(--accent-p2);
            background: rgba(239, 68, 68, 0.08);
        }

        .name {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: #71717a;
            margin-bottom: 2px;
        }

        .player-box.active .name {
            color: #fff;
        }

        .score {
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 1;
        }

        /* 3. BOTTOM SECTION: TURN TRACKER & ACTIONS */
        .turn-panel {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .turn-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 0 4px;
        }

        .dart-slots {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .dart-slot {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1.1rem;
            color: #e4e4e7;
        }

        /* Mobile Utility Buttons */
        .button-grid {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        button {
            flex: 1;
            background: #27272a;
            color: #fff;
            border: none;
            padding: 15px 10px; /* Tall, thumb-friendly tap target */
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
        }

        button:active {
            background: #3f3f46;
        }

        button.miss {
            background: #a16207;
            flex: 1.5; /* Larger target area for misses */
        }
        button.miss:active {
            background: #ca8a04;
        }

        button.reset {
            background: #7f1d1d;
            max-width: 70px;
            font-size: 0.85rem;
        }

        /* SVG Specific Tweak for Mobile Responsiveness */
        .segment {
            cursor: pointer;
        }
        .segment:active {
            fill: #facc15 !important; /* Visual flash feedback on mobile tap */
        }

        .wire {
            stroke: #ffffff;
            stroke-width: 1.2;
            fill: none;
            pointer-events: none;
        }

        .board-text {
            fill: #ffffff;
            font-size: 24px;
            font-weight: 800;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="board-wrapper">
            <svg viewBox="0 0 600 600" id="dartboard-svg">
                <circle cx="300" cy="300" r="285" fill="#000" />
                <g id="board-segments"></g>
                <circle class="segment" data-score="25" data-mult="1" data-label="B25" cx="300" cy="300" r="24" fill="var(--board-green)" />
                <circle class="segment" data-score="50" data-mult="1" data-label="B50" cx="300" cy="300" r="10" fill="var(--board-red)" />
                <circle class="wire" cx="300" cy="300" r="24" />
                <circle class="wire" cx="300" cy="300" r="132" />
                <circle class="wire" cx="300" cy="300" r="148" />
                <circle class="wire" cx="300" cy="300" r="214" />
                <circle class="wire" cx="300" cy="300" r="230" />
            </svg>
        </div>

        <div class="scoreboard">
            <div class="player-box active p1" id="card-p1">
                <div class="name">Player 1</div>
                <div class="score" id="score-p1">501</div>
            </div>
            <div class="player-box p2" id="card-p2">
                <div class="name">Player 2</div>
                <div class="score" id="score-p2">501</div>
            </div>
        </div>

        <div class="turn-panel">
            <div class="turn-status">
                <span id="turn-txt" style="color: var(--accent-p1);">PLAYER 1 THROWING</span>
            </div>
            
            <div class="dart-slots">
                <div class="dart-slot" id="d1">-</div>
                <div class="dart-slot" id="d2">-</div>
                <div class="dart-slot" id="d3">-</div>
            </div>

            <div class="button-grid">
                <button class="miss" onclick="handleMiss()">MISS</button>
                <button onclick="undoLastDart()">UNDO</button>
                <button class="reset" onclick="resetMatch()">RESET</button>
            </div>
        </div>

    </div>

    <script>
        const boardNumbers = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
        let scores = { p1: 501, p2: 501 };
        let activePlayer = 'p1';
        let currentTurnDarts = [];
        let matchHistory = [];

        function buildBoard() {
            const container = document.getElementById('board-segments');
            let htmlString = "";
            const cx = 300, cy = 300;
            const rDoubleOut = 230, rDoubleIn = 214, rTripleOut = 148, rTripleIn = 132;
            const anglePerSlice = 360 / 20;

            boardNumbers.forEach((num, index) => {
                const startAngle = (index * anglePerSlice) - 90 - (anglePerSlice / 2);
                const endAngle = startAngle + anglePerSlice;
                const isEven = index % 2 === 0;
                const mainColor = isEven ? "var(--board-black)" : "var(--board-beige)";
                const ringColor = isEven ? "var(--board-red)" : "var(--board-green)";

                const polarToCartesian = (r, angle) => {
                    const rad = (angle * Math.PI) / 180.0;
                    return { x: cx + (r * Math.cos(rad)), y: cy + (r * Math.sin(rad)) };
                };

                const dPath = (rIn, rOut) => {
                    const p1 = polarToCartesian(rOut, startAngle);
                    const p2 = polarToCartesian(rOut, endAngle);
                    const p3 = polarToCartesian(rIn, endAngle);
                    const p4 = polarToCartesian(rIn, startAngle);
                    return `M ${p1.x} ${p1.y} A ${rOut} ${rOut} 0 0 1 ${p2.x} ${p2.y} L ${p3.x} ${p3.y} A ${rIn} ${rIn} 0 0 0 ${p4.x} ${p4.y} Z`;
                };

                htmlString += `<path class="segment" data-score="${num}" data-mult="2" data-label="D${num}" d="${dPath(rDoubleIn, rDoubleOut)}" fill="${ringColor}"/>`;
                htmlString += `<path class="segment" data-score="${num}" data-mult="1" data-label="${num}" d="${dPath(rTripleOut, rDoubleIn)}" fill="${mainColor}"/>`;
                htmlString += `<path class="segment" data-score="${num}" data-mult="3" data-label="T${num}" d="${dPath(rTripleIn, rTripleOut)}" fill="${ringColor}"/>`;
                htmlString += `<path class="segment" data-score="${num}" data-mult="1" data-label="${num}" d="${dPath(24, rTripleIn)}" fill="${mainColor}"/>`;

                const textPos = polarToCartesian(258, startAngle + (anglePerSlice / 2));
                htmlString += `<text x="${textPos.x}" y="${textPos.y}" class="board-text">${num}</text>`;
            });
            container.innerHTML = htmlString;
        }

        function registerDart(score, multiplier, label) {
            const hitValue = score * multiplier;
            matchHistory.push({ scores: { ...scores }, activePlayer, currentTurnDarts: [...currentTurnDarts] });

            const currentScore = scores[activePlayer];
            const prospectiveScore = currentScore - hitValue;

            if (prospectiveScore < 0 || prospectiveScore === 1) {
                alert(`Bust! Left with invalid score.`);
                currentTurnDarts.push("Bust");
                while(currentTurnDarts.length < 3) currentTurnDarts.push("-");
            } else {
                scores[activePlayer] = prospectiveScore;
                currentTurnDarts.push(label);
            }

            updateUI();

            if (currentTurnDarts.length >= 3) {
                setTimeout(() => {
                    activePlayer = (activePlayer === 'p1') ? 'p2' : 'p1';
                    currentTurnDarts = [];
                    updateUI();
                }, 500);
            }
        }

        function handleMiss() { registerDart(0, 1, "Miss"); }

        function undoLastDart() {
            if (matchHistory.length === 0) return;
            const prev = matchHistory.pop();
            scores = prev.scores;
            activePlayer = prev.activePlayer;
            currentTurnDarts = prev.currentTurnDarts;
            updateUI();
        }

        function resetMatch() {
            if(confirm("Reset match?")) {
                scores = { p1: 501, p2: 501 };
                activePlayer = 'p1';
                currentTurnDarts = [];
                matchHistory = [];
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('score-p1').innerText = scores.p1;
            document.getElementById('score-p2').innerText = scores.p2;
            document.getElementById('card-p1').classList.toggle('active', activePlayer === 'p1');
            document.getElementById('card-p2').classList.toggle('active', activePlayer === 'p2');

            const txt = document.getElementById('turn-txt');
            if(activePlayer === 'p1') {
                txt.innerText = "PLAYER 1 THROWING";
                txt.style.color = "var(--accent-p1)";
            } else {
                txt.innerText = "PLAYER 2 THROWING";
                txt.style.color = "var(--accent-p2)";
            }

            document.getElementById('d1').innerText = currentTurnDarts[0] || "-";
            document.getElementById('d2').innerText = currentTurnDarts[1] || "-";
            document.getElementById('d3').innerText = currentTurnDarts[2] || "-";
        }

        buildBoard();
        updateUI();

        document.getElementById('dartboard-svg').addEventListener('click', function(e) {
            const seg = e.target.closest('.segment');
            if (!seg) return;
            registerDart(parseInt(seg.getAttribute('data-score')), parseInt(seg.getAttribute('data-mult')), seg.getAttribute('data-label'));
        });
    </script>
</body>
</html>
